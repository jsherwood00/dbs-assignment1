<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maison Vertige</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400&display=swap');

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', Helvetica, sans-serif;
      background: linear-gradient(170deg, #1a1520 0%, #2a1e30 30%, #1e2a30 60%, #152028 100%);
      color: #b8a8c0;
      min-height: 100vh;
      line-height: 1.7;
    }

    /* Subtle warm glow */
    .glow {
      position: fixed;
      inset: 0;
      z-index: 0;
      background:
        radial-gradient(ellipse at 50% 0%, rgba(180, 140, 160, 0.06) 0%, transparent 50%),
        radial-gradient(ellipse at 20% 90%, rgba(140, 160, 180, 0.04) 0%, transparent 40%);
    }

    .content {
      position: relative;
      z-index: 1;
    }

    .page {
      max-width: 560px;
      margin: 0 auto;
      padding: 7rem 2rem 8rem;
    }

    .brand {
      font-size: 0.5rem;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: #5a4a60;
      font-weight: 300;
      margin-bottom: 6rem;
    }

    h1 {
      font-family: 'Instrument Serif', Georgia, serif;
      font-weight: 400;
      font-size: 2.8rem;
      line-height: 1.15;
      color: #d8c8e0;
      margin-bottom: 0.6rem;
    }

    .tagline {
      font-family: 'Instrument Serif', Georgia, serif;
      font-style: italic;
      font-size: 1rem;
      color: #6a5878;
      margin-bottom: 6rem;
    }

    .body-text {
      font-size: 0.78rem;
      font-weight: 300;
      color: #7a6a82;
      line-height: 2;
      margin-bottom: 5rem;
    }

    /* Fragrances with soft color accents */
    .fragrances {
      margin-bottom: 6rem;
    }

    .frag {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 0;
      border-bottom: 1px solid rgba(180, 140, 180, 0.08);
    }

    .frag:first-child {
      border-top: 1px solid rgba(180, 140, 180, 0.08);
    }

    .frag-left {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .frag-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .frag:nth-child(1) .frag-dot { background: #8a6090; box-shadow: 0 0 8px rgba(138, 96, 144, 0.3); }
    .frag:nth-child(2) .frag-dot { background: #607a8a; box-shadow: 0 0 8px rgba(96, 122, 138, 0.3); }
    .frag:nth-child(3) .frag-dot { background: #8a7a60; box-shadow: 0 0 8px rgba(138, 122, 96, 0.3); }
    .frag:nth-child(4) .frag-dot { background: #608a70; box-shadow: 0 0 8px rgba(96, 138, 112, 0.3); }
    .frag:nth-child(5) .frag-dot { background: #7a608a; box-shadow: 0 0 8px rgba(122, 96, 138, 0.3); }

    .frag-name {
      font-family: 'Instrument Serif', Georgia, serif;
      font-size: 0.95rem;
      color: #c0b0c8;
    }

    .frag-year {
      font-size: 0.65rem;
      font-weight: 300;
      color: #4a3e52;
      letter-spacing: 0.08em;
    }

    .colophon {
      font-size: 0.48rem;
      letter-spacing: 0.3em;
      color: #3a2e42;
      text-transform: uppercase;
      font-weight: 300;
    }

    @media (max-width: 600px) {
      h1 { font-size: 2rem; }
      .page { padding: 5rem 1.5rem 6rem; }
    }
  </style>
</head>
<body>

  <div class="glow"></div>

  <div class="content">
    <div class="page">
      <p class="brand">Maison Vertige</p>

      <h1>Five fragrances.<br>Forty years apart.</h1>
      <p class="tagline">Paris, since 1984</p>

      <p class="body-text">
        One house. One address. No ambassadors, no explanations.
        A single numbered fragrance each decade — five in all.
      </p>

      <div class="fragrances">
        <div class="frag">
          <div class="frag-left">
            <div class="frag-dot"></div>
            <span class="frag-name">Vertige N° 1</span>
          </div>
          <span class="frag-year">1984</span>
        </div>
        <div class="frag">
          <div class="frag-left">
            <div class="frag-dot"></div>
            <span class="frag-name">Vertige N° 2</span>
          </div>
          <span class="frag-year">1994</span>
        </div>
        <div class="frag">
          <div class="frag-left">
            <div class="frag-dot"></div>
            <span class="frag-name">Vertige N° 3</span>
          </div>
          <span class="frag-year">2004</span>
        </div>
        <div class="frag">
          <div class="frag-left">
            <div class="frag-dot"></div>
            <span class="frag-name">Vertige N° 4</span>
          </div>
          <span class="frag-year">2014</span>
        </div>
        <div class="frag">
          <div class="frag-left">
            <div class="frag-dot"></div>
            <span class="frag-name">Vertige N° 5</span>
          </div>
          <span class="frag-year">2024</span>
        </div>
      </div>

      <p class="colophon">Paris — Est. 1984</p>
    </div>
  </div>

</body>
</html>
